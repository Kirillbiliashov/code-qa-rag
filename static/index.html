<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Code QA RAG</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main>
      <h1>Code QA RAG</h1>
      <p class="lead">
        Upload your code repository as a <strong>.zip</strong> archive to start
        asking questions about it.
      </p>

      <section class="panel">
        <label class="file-picker" for="file-input">
          <span id="file-label">Click to pick a .zip archive</span>
        </label>
        <input id="file-input" type="file" accept=".zip" />
        <div class="row">
          <button id="upload-btn" disabled>Upload</button>
          <span id="upload-status" class="status"></span>
        </div>
      </section>
    </main>

    <script>
      const fileInput = document.getElementById("file-input");
      const fileLabel = document.getElementById("file-label");
      const uploadBtn = document.getElementById("upload-btn");
      const uploadStatus = document.getElementById("upload-status");

      fileInput.addEventListener("change", () => {
        const f = fileInput.files[0];
        if (!f) {
          uploadBtn.disabled = true;
          fileLabel.textContent = "Click to pick a .zip archive";
          return;
        }
        if (!f.name.toLowerCase().endsWith(".zip")) {
          fileLabel.innerHTML = '<span class="error">Please pick a .zip file</span>';
          uploadBtn.disabled = true;
          return;
        }
        fileLabel.innerHTML = '<span class="filename">' + f.name + "</span>";
        uploadBtn.disabled = false;
      });

      uploadBtn.addEventListener("click", async () => {
        const f = fileInput.files[0];
        if (!f) return;
        uploadBtn.disabled = true;
        uploadStatus.innerHTML = '<span class="spinner"></span>Parsing repository…';

        const form = new FormData();
        form.append("file", f);

        try {
          const res = await fetch("/api/upload", { method: "POST", body: form });
          if (!res.ok) {
            const err = await res.json().catch(() => ({ detail: res.statusText }));
            throw new Error(err.detail || "Upload failed");
          }
          const data = await res.json();
          uploadStatus.textContent =
            "Parsed " + data.chunks + " chunks from " + data.files_processed + " files. Redirecting…";
          window.location.href = "/qa/" + encodeURIComponent(data.repo_id);
        } catch (e) {
          uploadStatus.innerHTML = '<span class="error">' + e.message + "</span>";
          uploadBtn.disabled = false;
        }
      });
    </script>
  </body>
</html>
