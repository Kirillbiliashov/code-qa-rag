<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Code QA RAG</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      :root {
        --bg: #0f1115;
        --panel: #171a21;
        --border: #262a33;
        --text: #e6e8ee;
        --muted: #9aa3b2;
        --accent: #6aa3ff;
        --error: #ff7474;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
      }
      main {
        max-width: 720px;
        margin: 0 auto;
        padding: 48px 24px;
      }
      h1 { font-size: 22px; margin: 0 0 8px; }
      p.lead { color: var(--muted); margin: 0 0 28px; }
      .panel {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 24px;
        margin-bottom: 20px;
      }
      label.file-picker {
        display: block;
        text-align: center;
        padding: 32px 16px;
        border: 1px dashed var(--border);
        border-radius: 8px;
        cursor: pointer;
        color: var(--muted);
      }
      label.file-picker:hover { border-color: var(--accent); color: var(--text); }
      input[type=file] { display: none; }
      .filename { color: var(--text); }
      button {
        background: var(--accent);
        color: #0f1115;
        border: 0;
        padding: 10px 18px;
        font-weight: 600;
        border-radius: 8px;
        cursor: pointer;
        font-size: 14px;
      }
      button:disabled { opacity: 0.5; cursor: not-allowed; }
      button.secondary {
        background: transparent;
        color: var(--accent);
        border: 1px solid var(--border);
      }
      textarea {
        width: 100%;
        background: #0f1115;
        color: var(--text);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 12px;
        font-family: inherit;
        font-size: 14px;
        resize: vertical;
        min-height: 90px;
      }
      .row { display: flex; gap: 10px; align-items: center; margin-top: 12px; }
      .status { color: var(--muted); font-size: 13px; margin-top: 12px; }
      .error { color: var(--error); }
      .answer {
        white-space: pre-wrap;
        background: #0f1115;
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 16px;
        margin-top: 16px;
        min-height: 60px;
      }
      .spinner {
        width: 16px; height: 16px;
        border: 2px solid var(--border);
        border-top-color: var(--accent);
        border-radius: 50%;
        display: inline-block;
        animation: spin 0.8s linear infinite;
        vertical-align: middle;
        margin-right: 8px;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
      .hidden { display: none !important; }
    </style>
  </head>
  <body>
    <main>
      <h1>Code QA RAG</h1>
      <p class="lead">
        Upload your code repository as a <strong>.zip</strong> archive, then ask
        questions about it.
      </p>

      <section id="upload-panel" class="panel">
        <label class="file-picker" for="file-input">
          <span id="file-label">Click to pick a .zip archive</span>
        </label>
        <input id="file-input" type="file" accept=".zip" />
        <div class="row">
          <button id="upload-btn" disabled>Upload</button>
          <span id="upload-status" class="status"></span>
        </div>
      </section>

      <section id="qa-panel" class="panel hidden">
        <div id="qa-input-block">
          <p class="lead" style="margin-bottom:12px;">
            Ask anything about the uploaded codebase.
          </p>
          <textarea
            id="question"
            placeholder="e.g. How is authentication implemented?"
          ></textarea>
          <div class="row">
            <button id="ask-btn">Ask</button>
            <span id="ask-status" class="status"></span>
          </div>
        </div>

        <div id="qa-answer-block" class="hidden">
          <div class="answer" id="answer"></div>
          <div class="row">
            <button id="again-btn" class="secondary">Ask another question</button>
          </div>
        </div>
      </section>
    </main>

    <script>
      const $ = (id) => document.getElementById(id);

      const fileInput = $("file-input");
      const fileLabel = $("file-label");
      const uploadBtn = $("upload-btn");
      const uploadStatus = $("upload-status");
      const uploadPanel = $("upload-panel");
      const qaPanel = $("qa-panel");
      const qaInputBlock = $("qa-input-block");
      const qaAnswerBlock = $("qa-answer-block");
      const questionEl = $("question");
      const askBtn = $("ask-btn");
      const askStatus = $("ask-status");
      const answerEl = $("answer");
      const againBtn = $("again-btn");

      fileInput.addEventListener("change", () => {
        const f = fileInput.files[0];
        if (!f) {
          uploadBtn.disabled = true;
          fileLabel.textContent = "Click to pick a .zip archive";
          return;
        }
        if (!f.name.toLowerCase().endsWith(".zip")) {
          fileLabel.innerHTML = '<span class="error">Please pick a .zip file</span>';
          uploadBtn.disabled = true;
          return;
        }
        fileLabel.innerHTML = '<span class="filename">' + f.name + '</span>';
        uploadBtn.disabled = false;
      });

      uploadBtn.addEventListener("click", async () => {
        const f = fileInput.files[0];
        if (!f) return;
        uploadBtn.disabled = true;
        uploadStatus.innerHTML = '<span class="spinner"></span>Parsing repository…';
        uploadStatus.classList.remove("error");

        const form = new FormData();
        form.append("file", f);

        try {
          const res = await fetch("/api/upload", { method: "POST", body: form });
          if (!res.ok) {
            const err = await res.json().catch(() => ({ detail: res.statusText }));
            throw new Error(err.detail || "Upload failed");
          }
          const data = await res.json();
          uploadStatus.textContent =
            "Parsed " + data.chunks + " chunks from " + data.files_processed + " files.";
          uploadPanel.classList.add("hidden");
          qaPanel.classList.remove("hidden");
          questionEl.focus();
        } catch (e) {
          uploadStatus.innerHTML = '<span class="error">' + e.message + '</span>';
          uploadBtn.disabled = false;
        }
      });

      async function submitQuestion() {
        const q = questionEl.value.trim();
        if (!q) return;
        askBtn.disabled = true;
        askStatus.innerHTML = '<span class="spinner"></span>Thinking…';

        try {
          const res = await fetch("/api/ask", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ question: q }),
          });
          if (!res.ok) {
            const err = await res.json().catch(() => ({ detail: res.statusText }));
            throw new Error(err.detail || "Request failed");
          }
          const data = await res.json();
          answerEl.textContent = data.answer || "(no answer yet — endpoint stub)";
          qaInputBlock.classList.add("hidden");
          qaAnswerBlock.classList.remove("hidden");
        } catch (e) {
          askStatus.innerHTML = '<span class="error">' + e.message + '</span>';
        } finally {
          askBtn.disabled = false;
          askStatus.textContent = "";
        }
      }

      askBtn.addEventListener("click", submitQuestion);
      questionEl.addEventListener("keydown", (e) => {
        if ((e.metaKey || e.ctrlKey) && e.key === "Enter") submitQuestion();
      });

      againBtn.addEventListener("click", () => {
        questionEl.value = "";
        answerEl.textContent = "";
        qaAnswerBlock.classList.add("hidden");
        qaInputBlock.classList.remove("hidden");
        questionEl.focus();
      });
    </script>
  </body>
</html>
