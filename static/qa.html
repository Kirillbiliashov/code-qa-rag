<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Code QA RAG — Ask</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="/static/styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
  </head>
  <body>
    <main>
      <h1>Ask the codebase</h1>
      <p class="lead">
        Repository ID: <code id="repo-id"></code> ·
        <a href="/">upload another</a>
      </p>
      <p class="lead" id="quota-banner"></p>

      <section class="panel">
        <div id="qa-input-block">
          <textarea
            id="question"
            placeholder="e.g. How is authentication implemented?"
          ></textarea>
          <div class="row">
            <button id="ask-btn">Ask</button>
            <span id="ask-status" class="status"></span>
          </div>
        </div>

        <div id="qa-answer-block" class="hidden">
          <div class="answer" id="answer"></div>
          <div class="row">
            <button id="again-btn" class="secondary">Ask another question</button>
          </div>
        </div>
      </section>
    </main>

    <script>
      const repoId = decodeURIComponent(
        window.location.pathname.split("/").filter(Boolean).pop() || ""
      );
      document.getElementById("repo-id").textContent = repoId;

      const questionEl = document.getElementById("question");
      const askBtn = document.getElementById("ask-btn");
      const askStatus = document.getElementById("ask-status");
      const answerEl = document.getElementById("answer");
      const againBtn = document.getElementById("again-btn");
      const qaInputBlock = document.getElementById("qa-input-block");
      const qaAnswerBlock = document.getElementById("qa-answer-block");
      const quotaBanner = document.getElementById("quota-banner");

      function renderQuota(quota) {
        if (!quota) {
          quotaBanner.textContent = "";
          return;
        }
        const used = quota.queries_count;
        const total = quota.quota;
        const remaining = Math.max(total - used, 0);
        const resetDate = new Date(quota.quota_reset);
        const resetStr = resetDate.toLocaleString([], {
          hour: "2-digit",
          minute: "2-digit",
          month: "short",
          day: "numeric",
        });
        const usedLine = used >= total
          ? `Daily query limit reached (${used}/${total}).`
          : `${remaining} of ${total} queries remaining today (${used}/${total} used).`;
        const resetLine = used > 0 ? ` Resets at ${resetStr}.` : "";
        quotaBanner.textContent = usedLine + resetLine;
        askBtn.disabled = used >= total;
      }

      async function refreshQuota() {
        try {
          const res = await fetch("/api/quota");
          if (res.ok) renderQuota(await res.json());
        } catch {}
      }

      async function submitQuestion() {
        const q = questionEl.value.trim();
        if (!q) return;
        askBtn.disabled = true;
        askStatus.innerHTML = '<span class="spinner"></span>Thinking…';

        try {
          const res = await fetch("/api/ask", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ repo_id: repoId, question: q }),
          });
          if (!res.ok) {
            const err = await res.json().catch(() => ({ detail: res.statusText }));
            if (res.status === 429) {
              await refreshQuota();
            } else {
              askBtn.disabled = false;
            }
            askStatus.innerHTML =
              '<span class="error">' + (err.detail || "Request failed") + "</span>";
            return;
          }
          const data = await res.json();
          if (data.answer) {
            answerEl.innerHTML = DOMPurify.sanitize(marked.parse(data.answer));
          } else {
            answerEl.textContent = "(no answer)";
          }
          renderQuota(data.quota);
          askStatus.textContent = "";
          qaInputBlock.classList.add("hidden");
          qaAnswerBlock.classList.remove("hidden");
        } catch (e) {
          askBtn.disabled = false;
          askStatus.innerHTML = '<span class="error">' + e.message + "</span>";
        }
      }

      refreshQuota();

      askBtn.addEventListener("click", submitQuestion);
      questionEl.addEventListener("keydown", (e) => {
        if ((e.metaKey || e.ctrlKey) && e.key === "Enter") submitQuestion();
      });
      againBtn.addEventListener("click", () => {
        questionEl.value = "";
        answerEl.textContent = "";
        qaAnswerBlock.classList.add("hidden");
        qaInputBlock.classList.remove("hidden");
        questionEl.focus();
      });
    </script>
  </body>
</html>
